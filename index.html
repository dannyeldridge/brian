<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dialed In Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --tile-top-bg: #161616;
      --tile-bot-bg: #0e0e0e;
      --tile-border: #222;
      --text: #e8e0d0;
      --text-dim: #6b6560;
      --accent: #c8a96e;
      --gap: 3px;
      --tw: 34px;
      --th: 52px;
      --fs: 1.65rem;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3.5rem;
      padding: 2rem;
    }

    .board {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      align-items: center;
    }

    .board-row {
      display: flex;
      gap: var(--gap);
    }

    /* ── Tile ─────────────────────────────────────────── */

    .tile {
      width: var(--tw);
      height: var(--th);
      position: relative;
      perspective: 400px;
      flex-shrink: 0;
    }

    .tu, .tl {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      border: 1px solid var(--tile-border);
      user-select: none;
    }

    .tu {
      top: 0;
      background: var(--tile-top-bg);
      border-bottom: 1px solid #000;
    }

    .tl {
      top: 50%;
      background: var(--tile-bot-bg);
    }

    .tw {
      height: var(--th);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fs);
      font-weight: bold;
      color: var(--text);
    }

    .tl .tw {
      margin-top: calc(var(--th) * -0.5);
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      border: 1px solid var(--tile-border);
      background: var(--tile-top-bg);
      transform-origin: bottom center;
      z-index: 2;
      pointer-events: none;
    }

    .flap.flip {
      animation: flapDown 120ms linear forwards;
    }

    @keyframes flapDown {
      from { transform: rotateX(0deg); }
      to   { transform: rotateX(-90deg); }
    }

    /* ── Row label ───────────────────────────────────── */

    .row-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    /* ── Clients ─────────────────────────────────────── */

    .clients {
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .client-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-box {
      width: 120px;
      height: 60px;
      border: 1px solid var(--tile-border);
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .logo-name {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .clients-divider {
      width: 1px;
      height: 40px;
      background: var(--tile-border);
    }

    /* ── Info footer ─────────────────────────────────── */

    .info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .info-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .info-value {
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .info-value a {
      color: inherit;
      text-decoration: none;
    }

    .info-value a:hover { text-decoration: underline; }

    .divider {
      width: 1px;
      height: 2rem;
      background: var(--tile-border);
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    @media (max-width: 600px) {
      :root { --tw: 22px; --th: 36px; --fs: 1.1rem; }
      .logo-box { width: 90px; height: 48px; }
      .clients { gap: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="board" aria-live="polite">
    <div class="board-row" id="row-0"></div>
    <div class="board-row" id="row-1"></div>
    <div class="board-row" id="row-2"></div>
    <div class="board-row" id="row-3"></div>
  </div>

  <div class="clients">
    <div class="client-logo">
      <div class="logo-box">[ NVE logo ]</div>
      <span class="logo-name">NVE Experience Agency</span>
    </div>
    <div class="clients-divider"></div>
    <div class="client-logo">
      <div class="logo-box">[ Metro PR logo ]</div>
      <span class="logo-name">Metro Public Relations</span>
    </div>
    <div class="clients-divider"></div>
    <div class="client-logo">
      <div class="logo-box">[ Dad Grass logo ]</div>
      <span class="logo-name">Dad Grass</span>
    </div>
  </div>

  <div class="info">
    <span class="info-label">Contact</span>
    <span class="info-value">
      <a href="mailto:brian@dialedinprojects.com">brian@dialedinprojects.com</a>
    </span>
  </div>

  <script>
    const CHARS = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@.-_&';

    const LINES = [
      'DIALED IN PROJECTS',
      'AWARD WINNING BRAND STRATEGY',
      'EXPERIENTIAL MARKETING',
      'LOGISTICS AND PARTNERSHIPS',
    ];

    const maxLen = Math.max(...LINES.map(l => l.length));
    function pad(s) { return s.padEnd(maxLen, ' '); }

    const ROWS = LINES.map(l => pad(l).split(''));

    function charIndex(c) {
      const i = CHARS.indexOf(c.toUpperCase());
      return i < 0 ? 0 : i;
    }
    function nextChar(c) {
      return CHARS[(charIndex(c) + 1) % CHARS.length];
    }

    function buildRow(rowId, chars) {
      const row = document.getElementById(rowId);
      return chars.map(() => {
        const el = document.createElement('div');
        el.className = 'tile';
        el.innerHTML = `
          <div class="tu"><div class="tw"> </div></div>
          <div class="tl"><div class="tw"> </div></div>
          <div class="flap"><div class="tw"> </div></div>
        `;
        row.appendChild(el);
        return {
          el,
          tuTw:   el.querySelector('.tu .tw'),
          tlTw:   el.querySelector('.tl .tw'),
          flap:   el.querySelector('.flap'),
          flapTw: el.querySelector('.flap .tw'),
          current: ' ',
        };
      });
    }

    const allTiles = ROWS.map((row, i) => buildRow(`row-${i}`, row));

    function stepTile(t, target) {
      return new Promise(resolve => {
        if (t.current === target) { resolve(false); return; }
        const from = t.current;
        const to   = nextChar(from);
        t.flapTw.textContent = from;
        t.tuTw.textContent   = to;
        t.flap.classList.remove('flip');
        void t.flap.offsetWidth;
        t.flap.classList.add('flip');
        t.flap.addEventListener('animationend', () => {
          t.current = to;
          t.tlTw.textContent   = to;
          t.flapTw.textContent = to;
          t.flap.classList.remove('flip');
          resolve(true);
        }, { once: true });
      });
    }

    // Animate a single tile to a target char, stepping through CHARS in order
    async function animateTileTo(t, target, startDelay = 0) {
      await new Promise(r => setTimeout(r, startDelay));
      while (t.current !== target) {
        await stepTile(t, target);
        if (t.current !== target)
          await new Promise(r => setTimeout(r, 18 + Math.random() * 26));
      }
    }

    // Animate a full row to a target char array, staggered left-to-right
    function animateRowTo(tiles, targets, baseDelay = 0) {
      return Promise.all(
        tiles.map((t, i) => animateTileTo(t, targets[i], baseDelay + i * 48))
      );
    }

    allTiles.forEach((tiles, i) => animateRowTo(tiles, ROWS[i], i * 150));
  </script>
</body>
</html>
