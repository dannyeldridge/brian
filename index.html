<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dialed In Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --tile-top-bg: #151515;
      --tile-bot-bg: #0c0c0c;
      --tile-border: #1f1f1f;
      --rule: #1a1a1a;
      --text: #ddd6c8;
      --text-dim: #4a4540;
      --text-mid: #7a7268;
      --accent: #c8a96e;
      --gap: 3px;
      --row-gap: 4px;
      --tw: 34px;
      --th: 52px;
      --fs: 1.65rem;
    }

    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 40%, #111 0%, #080808 70%);
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    /* ── Layout sections ─────────────────────────────── */

    .section {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .rule {
      width: 100%;
      max-width: 1100px;
      height: 1px;
      background: var(--rule);
      margin: 2.5rem 0;
    }

    /* ── Board ───────────────────────────────────────── */

    .board {
      display: flex;
      flex-direction: column;
      gap: var(--row-gap);
      align-items: center;
    }

    .board-row {
      display: flex;
      gap: var(--gap);
    }


    /* ── Tile ─────────────────────────────────────────── */

    .tile {
      width: var(--tw);
      height: var(--th);
      position: relative;
      perspective: 400px;
      flex-shrink: 0;
    }

    .tu, .tl {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      border: 1px solid var(--tile-border);
      user-select: none;
    }

    .tu {
      top: 0;
      background: var(--tile-top-bg);
      border-bottom: 1px solid #000;
    }

    .tl {
      top: 50%;
      background: var(--tile-bot-bg);
    }

    .tw {
      height: var(--th);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      font-size: var(--fs);
      font-weight: bold;
      color: var(--text);
    }

    .tl .tw { margin-top: calc(var(--th) * -0.5); }

    .flap {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      border: 1px solid var(--tile-border);
      background: var(--tile-top-bg);
      transform-origin: bottom center;
      z-index: 2;
      pointer-events: none;
    }

    .flap.flip { animation: flapDown 120ms linear forwards; }

    @keyframes flapDown {
      from { transform: rotateX(0deg); }
      to   { transform: rotateX(-90deg); }
    }

    /* ── Clients ─────────────────────────────────────── */

    .clients-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
      font-family: 'Bebas Neue', sans-serif;
    }

    .clients-row {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 560px;
      gap: 2rem;
    }

    .client-link {
      flex: 1;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      line-height: 1.0;
      letter-spacing: 0.05em;
      color: var(--text-mid);
      text-decoration: none;
      transition: color 0.25s;
    }

    .client-link--right { text-align: right; }
    .client-link--left  { text-align: left; }
    .client-link:hover  { color: var(--text); }

    .clients-pipe {
      width: 1px;
      height: 52px;
      background: var(--rule);
      flex-shrink: 0;
    }

    /* ── Contact ─────────────────────────────────────── */

    .contact-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      margin-bottom: 0.6rem;
    }

    .contact-email {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .contact-email:hover { opacity: 0.7; }

    /* scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    @media (max-width: 600px) {
      :root { --tw: 21px; --th: 34px; --fs: 1.05rem; }
      .client-link { font-size: 1.5rem; }
      .rule { margin: 1.75rem 0; }
    }
  </style>
</head>
<body>

  <div class="section">
    <div class="board" aria-live="polite">
      <div class="board-row" id="row-0"></div>
      <div class="board-row" id="row-1"></div>
      <div class="board-row" id="row-2"></div>
      <div class="board-row" id="row-3"></div>
      <div class="board-row" id="row-4"></div>
      <div class="board-row" id="row-5"></div>
      <div class="board-row" id="row-6"></div>
    </div>
  </div>

  <div class="rule"></div>

  <div class="section">
    <span class="clients-label">Clients</span>
    <div class="clients-row">
      <a class="client-link client-link--right" href="https://www.metropublicrelations.com/" target="_blank" rel="noopener">Metro Public<br>Relations</a>
      <div class="clients-pipe"></div>
      <a class="client-link client-link--left" href="https://dadgrass.com/" target="_blank" rel="noopener">Dad<br>Grass</a>
    </div>
  </div>

  <div class="rule"></div>

  <div class="section" style="align-items:center; gap:0.5rem;">
    <span class="clients-label">Contact</span>
    <a class="contact-email" href="mailto:brian@dialedinprojects.com">brian@dialedinprojects.com</a>
  </div>

  <script>
    const CHARS = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@.-_&';

    const LINES = [
      'DIALED IN PROJECTS',
      'AWARD WINNING BRAND STRATEGY',
      'EXPERIENTIAL MARKETING',
      'LOGISTICS AND PARTNERSHIPS',
    ];

    const maxLen = Math.max(...LINES.map(l => l.length));
    function pad(s) { return ' ' + s.padEnd(maxLen, ' ') + ' '; }

    const rowWidth = maxLen + 2;
    const EMPTY_ROW = ' '.repeat(rowWidth).split('');
    const ROWS = [EMPTY_ROW, ...LINES.slice(0,1).map(l => pad(l).split('')), EMPTY_ROW, ...LINES.slice(1).map(l => pad(l).split('')), EMPTY_ROW];

    function charIndex(c) {
      const i = CHARS.indexOf(c.toUpperCase());
      return i < 0 ? 0 : i;
    }
    function nextChar(c) {
      return CHARS[(charIndex(c) + 1) % CHARS.length];
    }

    function buildRow(rowId, chars) {
      const row = document.getElementById(rowId);
      return chars.map(() => {
        const el = document.createElement('div');
        el.className = 'tile';
        el.innerHTML = `
          <div class="tu"><div class="tw"> </div></div>
          <div class="tl"><div class="tw"> </div></div>
          <div class="flap"><div class="tw"> </div></div>
        `;
        row.appendChild(el);
        return {
          el,
          tuTw:   el.querySelector('.tu .tw'),
          tlTw:   el.querySelector('.tl .tw'),
          flap:   el.querySelector('.flap'),
          flapTw: el.querySelector('.flap .tw'),
          current: ' ',
        };
      });
    }

    const allTiles = ROWS.map((row, i) => buildRow(`row-${i}`, row));

    function stepTile(t, target) {
      return new Promise(resolve => {
        if (t.current === target) { resolve(false); return; }
        const from = t.current;
        const to   = nextChar(from);
        t.flapTw.textContent = from;
        t.tuTw.textContent   = to;
        t.flap.classList.remove('flip');
        void t.flap.offsetWidth;
        t.flap.classList.add('flip');
        t.flap.addEventListener('animationend', () => {
          t.current = to;
          t.tlTw.textContent   = to;
          t.flapTw.textContent = to;
          t.flap.classList.remove('flip');
          resolve(true);
        }, { once: true });
      });
    }

    async function animateTileTo(t, target, startDelay = 0) {
      await new Promise(r => setTimeout(r, startDelay));
      while (t.current !== target) {
        await stepTile(t, target);
        if (t.current !== target)
          await new Promise(r => setTimeout(r, 18 + Math.random() * 26));
      }
    }

    function animateRowTo(tiles, targets, baseDelay = 0) {
      return Promise.all(
        tiles.map((t, i) => animateTileTo(t, targets[i], baseDelay + i * 48))
      );
    }

    allTiles.forEach((tiles, i) => animateRowTo(tiles, ROWS[i], i * 150));
  </script>
</body>
</html>
