<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dialed In Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --tile-top-bg: #161616;
      --tile-bot-bg: #0e0e0e;
      --tile-border: #222;
      --text: #e8e0d0;
      --text-dim: #6b6560;
      --accent: #c8a96e;
      --gap: 3px;
      --tw: 38px;
      --th: 56px;
      --fs: 1.85rem;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3.5rem;
      padding: 2rem;
    }

    .board {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .board-row {
      display: flex;
      gap: var(--gap);
    }

    /* ── Tile ─────────────────────────────────────────── */

    .tile {
      width: var(--tw);
      height: var(--th);
      position: relative;
      perspective: 400px;
      flex-shrink: 0;
    }

    /*
      Half-character technique:
      Each half (.tu / .tl) is height/2 with overflow:hidden.
      Inside is a .tw (text-wrap) that is the full tile height,
      flex-centered so the character sits perfectly in the middle.
      .tu shows the top half; .tl shifts .tw up by 50% to show the bottom half.
    */

    .tu, .tl {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      border: 1px solid var(--tile-border);
      user-select: none;
    }

    .tu {
      top: 0;
      background: var(--tile-top-bg);
      border-bottom: 1px solid #000;
    }

    .tl {
      top: 50%;
      background: var(--tile-bot-bg);
    }

    .tw {
      height: calc(var(--th));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fs);
      font-weight: bold;
      color: var(--text);
    }

    .tl .tw {
      margin-top: calc(var(--th) * -0.5);
    }

    /* ── Flap (top half that rotates down) ────────────── */

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      border: 1px solid var(--tile-border);
      background: var(--tile-top-bg);
      transform-origin: bottom center;
      z-index: 2;
      pointer-events: none;
    }

    .flap .tw {
      /* same as .tu .tw */
    }

    .flap.flip {
      animation: flapDown 130ms linear forwards;
    }

    @keyframes flapDown {
      from { transform: rotateX(0deg); }
      to   { transform: rotateX(-90deg); }
    }

    /* ── Info footer ─────────────────────────────────── */

    .info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .info-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .info-value {
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .info-value a {
      color: inherit;
      text-decoration: none;
    }

    .info-value a:hover { text-decoration: underline; }

    .divider {
      width: 1px;
      height: 2rem;
      background: var(--tile-border);
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    @media (max-width: 520px) {
      :root { --tw: 28px; --th: 44px; --fs: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="board" aria-live="polite" aria-label="Dialed In Projects — Coming Soon">
    <div class="board-row" id="row-0"></div>
    <div class="board-row" id="row-1"></div>
  </div>

  <div class="info">
    <span class="info-label">Status</span>
    <span class="info-value">Coming Soon</span>
    <div class="divider"></div>
    <span class="info-label">Contact</span>
    <span class="info-value">
      <a href="mailto:brian@dialedinprojects.com">brian@dialedinprojects.com</a>
    </span>
  </div>

  <script>
    const CHARS = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@.-_';

    const LINES = [
      'DIALED IN PROJECTS',
      '  COMING  SOON    ',
    ];

    function charIndex(c) {
      const i = CHARS.indexOf(c.toUpperCase());
      return i < 0 ? 0 : i;
    }

    function nextChar(c) {
      return CHARS[(charIndex(c) + 1) % CHARS.length];
    }

    function makeTileHTML(ch) {
      return `
        <div class="tu"><div class="tw">${ch}</div></div>
        <div class="tl"><div class="tw">${ch}</div></div>
        <div class="flap"><div class="tw">${ch}</div></div>
      `;
    }

    // Build all tiles
    const tileMaps = LINES.map((line, rowIdx) => {
      const row = document.getElementById(`row-${rowIdx}`);
      return line.split('').map(targetChar => {
        const el = document.createElement('div');
        el.className = 'tile';
        el.innerHTML = makeTileHTML(' ');
        row.appendChild(el);

        return {
          el,
          tuTw:   el.querySelector('.tu .tw'),
          tlTw:   el.querySelector('.tl .tw'),
          flap:   el.querySelector('.flap'),
          flapTw: el.querySelector('.flap .tw'),
          current: ' ',
          target: targetChar,
        };
      });
    });

    function stepTile(t) {
      return new Promise(resolve => {
        if (t.current === t.target) { resolve(false); return; }

        const from = t.current;
        const to   = nextChar(from);

        // static halves already show `from` (from last step or init)
        // flap shows `from` and will rotate down
        t.flapTw.textContent = from;

        // behind the flap, update the upper static half to show `to`
        // (it's hidden by the flap until the flap rotates away)
        t.tuTw.textContent = to;

        // kick the flap animation
        t.flap.classList.remove('flip');
        void t.flap.offsetWidth;
        t.flap.classList.add('flip');

        t.flap.addEventListener('animationend', () => {
          t.current = to;
          // lower half now shows the new char
          t.tlTw.textContent = to;
          // reset flap to new char (hidden at 90deg, but reset for next step)
          t.flapTw.textContent = to;
          t.flap.classList.remove('flip');
          resolve(true);
        }, { once: true });
      });
    }

    function animateTile(t, delay) {
      setTimeout(async () => {
        while (true) {
          const changed = await stepTile(t);
          if (!changed) break;
          await new Promise(r => setTimeout(r, 20 + Math.random() * 28));
        }
      }, delay);
    }

    let d = 0;
    tileMaps.forEach(row => {
      row.forEach(t => { animateTile(t, d); d += 52; });
      d += 140;
    });
  </script>
</body>
</html>
